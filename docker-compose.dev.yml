# Development overrides — use with:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up
services:
  api:
    volumes:
      - ./backend:/app
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  web:
    command: ["npm", "run", "dev", "--", "-H", "0.0.0.0", "-p", "3000"]
