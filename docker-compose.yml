services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: bricoprohq
      POSTGRES_USER: bricopro
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bricopro}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bricopro -d bricoprohq"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

  api:
    image: ghcr.io/titatom/bricoprohq-api:latest
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://bricopro:${POSTGRES_PASSWORD:-bricopro}@db:5432/bricoprohq
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@bricopro.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin1234}
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  web:
    image: ghcr.io/titatom/bricoprohq-web:latest
    restart: unless-stopped
    environment:
      # Runtime — tells the Next.js server where to proxy /api/* requests
      API_URL: http://api:8000
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      - api

volumes:
  db_data:
  redis_data:
