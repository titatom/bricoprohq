services:
  bricoprohq:
    image: ghcr.io/titatom/bricoprohq:latest
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-production}
      SECRET_KEY: "${SECRET_KEY:?Set SECRET_KEY in .env before starting the app}"
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@bricopro.local}
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:?Set ADMIN_PASSWORD in .env before starting the app}"
      DATA_DIR: /data
      DATABASE_URL: ${DATABASE_URL:-sqlite+pysqlite:////data/bricoprohq.db}
      REDIS_URL: ${REDIS_URL:-}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:3000}
      API_URL: http://127.0.0.1:8000
    ports:
      - "${WEB_PORT:-3000}:3000"
    volumes:
      - ${APPDATA_PATH:-./data}:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).status == 200 else sys.exit(1)"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
