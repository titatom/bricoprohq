version: '3.9'
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: bricoprohq
      POSTGRES_USER: bricopro
      POSTGRES_PASSWORD: bricopro
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build:
      context: ./backend
    environment:
      APP_ENV: development
      DATABASE_URL: postgresql+psycopg://bricopro:bricopro@db:5432/bricoprohq
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: change-me
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

  web:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  db_data:
